<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In — mPower Analytics</title>
  <link rel="stylesheet" href="/css/mpower.css" />
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .login-brand {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-subtitle {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .oauth-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-card);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      margin-bottom: 12px;
    }

    .oauth-btn:hover {
      border-color: var(--accent);
      background: var(--accent-subtle);
    }

    .oauth-btn svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .magic-form {
      display: flex;
      gap: 8px;
    }

    .magic-form .input {
      flex: 1;
    }

    .magic-message {
      margin-top: 12px;
      font-size: 13px;
      min-height: 20px;
    }

    .magic-message.success { color: #16a34a; }
    .magic-message.error { color: #dc2626; }

    .login-error {
      background: rgba(220, 38, 38, 0.08);
      border: 1px solid rgba(220, 38, 38, 0.2);
      color: #dc2626;
      padding: 10px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      margin-bottom: 24px;
    }

    .login-footer {
      margin-top: 32px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .login-footer .brand {
      color: var(--accent);
      font-weight: 600;
    }

    .theme-toggle-login {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>

  <div class="theme-toggle-login">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
    </button>
  </div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <span><span style="color: var(--text-primary);">C</span><span style="color: #8b3a3a;">alifornia</span></span><span><span style="color: var(--text-primary);">A</span><span style="color: #b35c3a;">dvantage</span></span> <span>Escrow</span>
      </div>
      <div class="login-subtitle">Santa Clarita Valley's premier escrow partner</div>

      <div id="error-banner" style="display: none;" class="login-error"></div>

      <!-- Google OAuth -->
      <a href="/auth/google" class="oauth-btn">
        <svg viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </a>

      <!-- Microsoft OAuth -->
      <a href="/auth/microsoft" class="oauth-btn">
        <svg viewBox="0 0 24 24">
          <rect x="1" y="1" width="10" height="10" fill="#F25022"/>
          <rect x="13" y="1" width="10" height="10" fill="#7FBA00"/>
          <rect x="1" y="13" width="10" height="10" fill="#00A4EF"/>
          <rect x="13" y="13" width="10" height="10" fill="#FFB900"/>
        </svg>
        Sign in with Microsoft
      </a>

      <div class="login-divider">or sign in with email</div>

      <!-- Magic Link -->
      <form class="magic-form" onsubmit="sendMagicLink(event)">
        <input type="email" class="input" id="magic-email" placeholder="your@email.com" required />
        <button type="submit" class="btn btn-primary">Send Link</button>
      </form>
      <div id="magic-message" class="magic-message"></div>

      <div class="login-footer">
        Powered by <span class="brand">mPower Insight</span>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    // Check for error params
    const params = new URLSearchParams(window.location.search);
    const error = params.get('error');
    if (error) {
      const banner = document.getElementById('error-banner');
      banner.style.display = 'block';
      if (error === 'denied') banner.textContent = 'Access denied — your email is not authorized. Contact your administrator.';
      else if (error === 'expired') banner.textContent = 'Login link expired. Please request a new one.';
      else banner.textContent = 'Authentication failed. Please try again.';
    }

    async function sendMagicLink(e) {
      e.preventDefault();
      const email = document.getElementById('magic-email').value;
      const msg = document.getElementById('magic-message');
      msg.textContent = 'Sending...';
      msg.className = 'magic-message';

      try {
        const res = await fetch('/auth/magic-link', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        msg.textContent = data.message;
        msg.className = `magic-message ${data.success ? 'success' : 'error'}`;
      } catch (err) {
        msg.textContent = 'Failed to send. Please try again.';
        msg.className = 'magic-message error';
      }
    }
  </script>
</body>
</html>
